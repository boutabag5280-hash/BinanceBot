name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  # Set RUFF_VERSION to a specific version string to pin ruff (e.g. "0.0.XXX").
  # Leave empty to install latest.
  RUFF_VERSION: ""

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Ruff (pinned if RUFF_VERSION set)
        run: |
          if [ -n "${{ env.RUFF_VERSION }}" ]; then
            pip install "ruff==${{ env.RUFF_VERSION }}"
          else
            pip install ruff
          fi

      - name: Run Ruff
        run: ruff check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          # Run pytest, but treat "no tests collected" (exit code 5) as success.
          pytest --tb=short -q || (rc=$?; if [ $rc -eq 5 ]; then echo "No tests collected."; exit 0; else exit $rc; fi)